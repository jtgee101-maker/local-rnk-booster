name: 200X CI Pipeline
on:
  push:
    branches: [main, sandbox/*]
  pull_request:
    branches: [main]

jobs:
  # 1. Build Verification
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check build output exists
        run: test -d dist && echo "✅ Build successful" || exit 1

  # 2. Security Audit
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run security audit
        run: npm audit --audit-level=moderate || true
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  # 3. Lighthouse Performance
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit with Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://gmb-rank-booster-f0798aa4.base44.app/
            https://harmonious-frangipane-ef2a99.netlify.app/
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true

  # 4. Bundle Size Check
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sb dist/assets/index-*.js | awk '{print $1}')
          MAX_SIZE=250000  # 250KB
          if [ $BUNDLE_SIZE -gt $MAX_SIZE ]; then
            echo "🔴 Bundle too large: $BUNDLE_SIZE bytes (max $MAX_SIZE)"
            exit 1
          else
            echo "✅ Bundle size OK: $BUNDLE_SIZE bytes"
          fi

  # 5. Notify on Failure
  notify:
    runs-on: ubuntu-latest
    needs: [build, security, lighthouse, bundle-size]
    if: failure()
    steps:
      - name: Alert on failure
        run: |
          echo "🔴 200X CI Pipeline FAILED"
          echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
